<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SEO Loop Harness</title>
    <meta
      name="description"
      content="Korean SEO blog loop harness for keyword, writing, image, CTA, and performance feedback."
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="control-panel" aria-label="콘텐츠 루프 입력">
        <div class="brand-row">
          <div>
            <p class="eyebrow">SEO Loop Harness</p>
            <h1>검색 의도에서 리드 전환까지</h1>
          </div>
          <span class="status-pill">local MVP</span>
        </div>

        <form id="loop-form" class="input-grid">
          <label>
            채널
            <select name="channel">
              <option value="owned-blog">자사 블로그</option>
              <option value="naver-support">네이버 보조 채널</option>
            </select>
          </label>
          <label>
            카테고리
            <select name="category">
              <option value="ax-trends" selected>AX 최신 동향</option>
              <option value="it">IT/SaaS</option>
              <option value="medical">의료</option>
              <option value="legal">법률</option>
              <option value="economy">일반 경제</option>
              <option value="sports-baseball">스포츠 - 야구</option>
              <option value="sports-basketball">스포츠 - 농구</option>
              <option value="fitness">운동/건강</option>
            </select>
          </label>
          <div class="field-label">
            <div class="field-top">
              <label for="primaryKeyword">핵심 키워드</label>
              <button
                class="field-magic"
                type="button"
                data-enhance-field="primaryKeyword"
                aria-label="핵심 키워드 개선"
                title="전체 문맥으로 개선"
              >
                ✦
              </button>
            </div>
            <textarea
              id="primaryKeyword"
              class="compact-textarea"
              name="primaryKeyword"
              rows="1"
              spellcheck="false"
            >AI 에이전트 도입 전략</textarea>
          </div>
          <div class="field-label">
            <div class="field-top">
              <label for="writingInstruction">이번 글 작성 지시</label>
              <button
                class="field-magic"
                type="button"
                data-enhance-field="writingInstruction"
                aria-label="이번 글 작성 지시 개선"
                title="전체 문맥으로 개선"
              >
                ✦
              </button>
            </div>
            <textarea
              id="writingInstruction"
              name="writingInstruction"
              rows="5"
              spellcheck="false"
              placeholder="예: 도구 소개가 아니라 운영 구조 관점으로 써줘. 보안, 권한, 비용, 실패 사례를 앞쪽에서 다루고 마지막 CTA는 과장 없이 상담 신청으로 연결해줘."
            ></textarea>
          </div>
          <label>
            참고 링크
            <textarea
              name="referenceUrls"
              rows="4"
              spellcheck="false"
              placeholder="참고할 링크를 줄바꿈으로 넣으세요&#10;https://example.com/report&#10;https://example.com/blog"
            ></textarea>
          </label>
          <div class="field-label">
            <div class="field-top">
              <label for="audience">타깃 독자</label>
              <button
                class="field-magic"
                type="button"
                data-enhance-field="audience"
                aria-label="타깃 독자 개선"
                title="전체 문맥으로 개선"
              >
                ✦
              </button>
            </div>
            <textarea
              id="audience"
              class="compact-textarea"
              name="audience"
              rows="1"
              spellcheck="false"
            >AX 도입을 검토하는 대표, 임원, 실무 책임자</textarea>
          </div>
          <div class="field-label">
            <div class="field-top">
              <label for="brandName">브랜드</label>
              <button
                class="field-magic"
                type="button"
                data-enhance-field="brandName"
                aria-label="브랜드 개선"
                title="전체 문맥으로 개선"
              >
                ✦
              </button>
            </div>
            <textarea
              id="brandName"
              class="compact-textarea"
              name="brandName"
              rows="1"
              spellcheck="false"
            >The Moonlight</textarea>
          </div>
          <div class="field-label">
            <div class="field-top">
              <label for="productName">제품/서비스</label>
              <button
                class="field-magic"
                type="button"
                data-enhance-field="productName"
                aria-label="제품/서비스 개선"
                title="전체 문맥으로 개선"
              >
                ✦
              </button>
            </div>
            <textarea
              id="productName"
              class="compact-textarea"
              name="productName"
              rows="1"
              spellcheck="false"
            >AX 컨설팅 및 AI 에이전트 구축</textarea>
          </div>
          <div class="field-label">
            <div class="field-top">
              <label for="leadGoal">리드 목표</label>
              <button
                class="field-magic"
                type="button"
                data-enhance-field="leadGoal"
                aria-label="리드 목표 개선"
                title="전체 문맥으로 개선"
              >
                ✦
              </button>
            </div>
            <textarea
              id="leadGoal"
              class="compact-textarea"
              name="leadGoal"
              rows="1"
              spellcheck="false"
            >도입 상담 신청</textarea>
          </div>
          <label>
            Claude 모델
            <input
              name="anthropicModel"
              value="claude-opus-4-8"
              list="claude-models"
              spellcheck="false"
            />
            <datalist id="claude-models">
              <option value="claude-opus-4-8"></option>
              <option value="claude-fable-5"></option>
              <option value="claude-sonnet-4-6"></option>
              <option value="claude-haiku-4-5"></option>
            </datalist>
          </label>
          <label>
            Claude effort
            <select name="anthropicEffort">
              <option value="high" selected>high</option>
              <option value="medium">medium</option>
              <option value="low">low</option>
            </select>
          </label>
          <div class="submit-dock">
            <button type="submit">시작하기</button>
          </div>
        </form>
      </section>

      <section class="workspace" aria-live="polite">
        <nav class="tabbar" aria-label="결과 탭">
          <button class="tab is-active" data-tab="outline">목차</button>
          <button class="tab" data-tab="structure">HTML 구조</button>
          <button class="tab" data-tab="body">본문</button>
          <button class="tab" data-tab="images">이미지</button>
          <button class="tab" data-tab="preview">HTML 미리보기</button>
          <button class="tab" data-tab="package">파일 내보내기</button>
          <button class="tab" data-tab="tracking">성과</button>
          <button class="tab" data-tab="history">기록</button>
        </nav>

        <section id="outline" class="tab-panel is-active">
          <div class="action-row split-actions">
            <button id="approve-outline" type="button">목차 승인</button>
            <button id="rewrite-outline" type="button">목차 다시 쓰기</button>
          </div>
          <label class="rewrite-box">
            목차 재작성 지시
            <textarea
              id="outline-revision"
              rows="3"
              spellcheck="false"
              placeholder="예: 의료 느낌 빼고 B2B SaaS 구매 담당자가 읽는 흐름으로, 비용/보안/조직 설득 섹션을 더 앞에 배치"
            ></textarea>
          </label>
          <div id="outline-output" class="article-output"></div>
        </section>

        <section id="structure" class="tab-panel">
          <div id="structure-output" class="article-output"></div>
        </section>

        <section id="body" class="tab-panel">
          <div class="action-row split-actions">
            <button id="run-claude" type="button">Claude로 본문 생성</button>
          </div>
          <div id="body-output" class="article-output"></div>
        </section>

        <section id="preview" class="tab-panel">
          <div class="action-row">
            <button id="create-preview" type="button">HTML 미리보기 생성</button>
          </div>
          <div id="preview-output" class="article-output"></div>
        </section>

        <section id="package" class="tab-panel">
          <div class="action-row">
            <button id="create-package" type="button">파일 내보내기</button>
          </div>
          <div id="package-output" class="article-output"></div>
        </section>

        <section id="images" class="tab-panel">
          <div id="image-output" class="image-grid"></div>
        </section>

        <section id="tracking" class="tab-panel">
          <form id="performance-form" class="metric-form">
            <label>
              노출
              <input name="impressions" type="number" placeholder="Search Console 노출" />
            </label>
            <label>
              클릭
              <input name="clicks" type="number" placeholder="Search Console 클릭" />
            </label>
            <label>
              평균순위
              <input name="avgPosition" type="number" step="0.1" placeholder="예: 8.4" />
            </label>
            <label>
              세션
              <input name="sessions" type="number" placeholder="GA4 세션" />
            </label>
            <label>
              CTA 클릭
              <input name="ctaClicks" type="number" placeholder="GTM CTA 클릭" />
            </label>
            <label>
              리드
              <input name="leads" type="number" placeholder="lead_submit" />
            </label>
            <button type="submit">성과 루프 계산/저장</button>
          </form>
          <div id="tracking-output" class="tracking-grid"></div>
        </section>

        <section id="history" class="tab-panel">
          <div class="action-row split-actions">
            <button id="refresh-history" type="button">현재 콘텐츠 기록 새로고침</button>
            <button id="toggle-history-scope" type="button">전체 기록 보기</button>
          </div>
          <div id="history-output" class="article-output"></div>
        </section>

      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
